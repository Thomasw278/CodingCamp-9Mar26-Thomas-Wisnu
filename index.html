<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Greeting Section -->
        <section id="greeting-section" class="greeting">
            <div id="greeting-message"></div>
            <div id="current-time"></div>
            <div id="current-date"></div>
        </section>

        <!-- Timer Section -->
        <section id="timer-section" class="timer">
            <div id="timer-display">25:00</div>
            <div class="timer-controls">
                <button id="timer-start" class="btn">Start</button>
                <button id="timer-stop" class="btn">Stop</button>
                <button id="timer-reset" class="btn">Reset</button>
            </div>
            <div class="timer-settings">
                <label for="timer-duration">Duration (minutes):</label>
                <input type="number" id="timer-duration" min="1" max="120" value="25">
            </div>
        </section>

        <!-- Task List Section -->
        <section id="task-list-section" class="task-list">
            <h2>Tasks</h2>
            <div class="task-input-container">
                <input type="text" id="task-input" placeholder="Add a new task...">
                <button id="task-add" class="btn">Add Task</button>
            </div>
            <div class="task-sort-controls">
                <label for="task-sort">Sort by:</label>
                <select id="task-sort">
                    <option value="date">Creation Date</option>
                    <option value="status">Completion Status</option>
                    <option value="custom">Custom Order</option>
                </select>
            </div>
            <ul id="task-list" class="tasks"></ul>
        </section>

        <!-- Quick Links Section -->
        <section id="quick-links-section" class="quick-links">
            <h2>Quick Links</h2>
            <div class="link-input-container">
                <input type="text" id="link-name" placeholder="Link name...">
                <input type="url" id="link-url" placeholder="https://example.com">
                <button id="link-add" class="btn">Add Link</button>
            </div>
            <div id="links-list" class="links"></div>
        </section>

        <!-- Theme Toggle Section -->
        <section id="theme-section" class="theme-toggle">
            <button id="theme-toggle-btn" class="btn">Toggle Theme</button>
        </section>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
